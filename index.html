<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Homepage - Bootstrap</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="home page bootstrap.css">
</head>

<body>


<div class="container-fluid">
    <div class="d-flex justify-content-end align-items-center gap-3 p-3">
        <a href="#" class="text-dark text-decoration-none">Gmail</a>
        <a href="#" class="text-dark text-decoration-none">Images</a>
        <img src="dots.png" width="20" alt="dots">
        <img src="letter-m.png" width="32" class="rounded-circle" alt="letter-m">
    </div>
</div>


<div class="container text-center main-section">
    
    <img src="google logo.svg" width="270" class="mb-4" alt="google logo">

    <div class="search-box d-flex align-items-center mx-auto px-3">
        <input type="text" class="form-control border-0 shadow-none">
        <img src="mic.svg" width="20" alt="mic">
    </div>

    <div class="mt-4">
        <button class="btn btn-light border me-2">Google Search</button>
        <button class="btn btn-light border">I'm Feeling Lucky</button>
    </div>

    <div class="mt-4 small">
        Google offered in:
        <a href="#" class="text-decoration-none">Indonesia</a>
        <a href="#" class="text-decoration-none">Basa Bali</a>
    </div>
</div>


<footer class="mt-auto py-3">
    <div class="container">
        <div class="border-bottom pb-2 mb-2 text-muted">
            Indonesia
        </div>
        <div class="d-flex justify-content-between flex-wrap small">
            <div>
                <a href="#" class="text-muted text-decoration-none me-3">About</a>
                <a href="#" class="text-muted text-decoration-none me-3">Advertising</a>
                <a href="#" class="text-muted text-decoration-none">Business</a>
            </div>
            <div>
                <a href="#" class="text-muted text-decoration-none me-3">Privacy</a>
                <a href="#" class="text-muted text-decoration-none">Terms</a>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
